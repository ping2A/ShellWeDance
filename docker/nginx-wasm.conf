# Serve the PowerShell WASM UI at /. Static files: index.html, pkg/, indicators/
server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Do not set `types { }` here — it replaces inherited mime.types and breaks
    # .js (ES modules need application/javascript). WASM is added in Dockerfile.

    location / {
        try_files $uri $uri/ =404;
    }

    location = / {
        try_files /index.html =404;
    }
}
